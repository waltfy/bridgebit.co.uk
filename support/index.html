<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Support | BridgeBit LTD</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
				"SF Pro Text", "Segoe UI", sans-serif;
			background: #F5F5F7;
			color: #1D1D1F;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			padding: 24px;
		}

		.card {
			background: white;
			max-width: 560px;
			width: 100%;
			border-radius: 24px;
			padding: 48px;
			text-align: center;
			box-shadow:
				0 10px 40px rgba(0, 0, 0, .08),
				0 2px 8px rgba(0, 0, 0, .04);
		}

		.icon {
			font-size: 54px;
			margin-bottom: 20px;
		}

		h1 {
			font-size: 2rem;
			margin-bottom: 16px;
			font-weight: 700;
		}

		p {
			color: #6E6E73;
			line-height: 1.6;
			margin-bottom: 32px;
			font-size: 1.05rem;
		}

		.button {
			display: inline-block;
			text-decoration: none;
			background: #007AFF;
			color: white;
			padding: 16px 28px;
			border-radius: 14px;
			font-weight: 600;
			font-size: 1rem;
			transition: .2s ease;
		}

		.button:hover {
			background: #0066DB;
			transform: translateY(-1px);
		}

		.footer {
			margin-top: 36px;
			font-size: .9rem;
			color: #86868B;
		}

		.footer a {
			color: #007AFF;
			text-decoration: none;
		}

		@media (max-width: 600px) {
			.card {
				padding: 36px 28px;
			}

			h1 {
				font-size: 1.75rem;
			}
		}
	</style>
</head>

<body>

	<div class="card">

		<div class="icon">💬</div>

		<h1>Support</h1>

		<p>
			Need help with one of our products?
			Whether you've found a bug, have a question,
			or want to suggest a feature, we'd love to hear from you.
		</p>

		<a class="button" href="https://forms.gle/TrHVfLhwJiGPWGtYA" target="_blank" rel="noopener noreferrer">
			Submit a Support Request
		</a>

		<div class="footer">
			We typically respond within <strong>1–5 business days</strong>.
			<br>
			<br>
		</div>

	</div>

</body>

</html>
